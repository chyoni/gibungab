spring:
  datasource:
    url: jdbc:h2:mem:gibungab;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

jwt:
  secret: dev-secret-key-at-least-32-characters-long-for-hs256

oauth2:
  kakao:
    client-id: dev-kakao-client-id
    redirect-uri: http://localhost:8080/oauth2/callback/kakao
  google:
    client-id: dev-google-client-id
    client-secret: dev-google-client-secret
    redirect-uri: http://localhost:8080/oauth2/callback/google
