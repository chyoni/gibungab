spring:
  application:
    name: gibungab
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 1800000    # 30 minutes
  refresh-token-expiry-ms: 1209600000 # 14 days
