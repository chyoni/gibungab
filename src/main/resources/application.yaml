spring:
  application:
    name: gibungab
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 1800000    # 30 minutes
  refresh-token-expiry-ms: 1209600000 # 14 days

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:gibungab;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

jwt:
  secret: dev-secret-key-at-least-32-characters-long-for-hs256

oauth2:
  kakao:
    client-id: dev-kakao-client-id
    redirect-uri: http://localhost:8080/oauth2/callback/kakao
  google:
    client-id: dev-google-client-id
    client-secret: dev-google-client-secret
    redirect-uri: http://localhost:8080/oauth2/callback/google

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never
